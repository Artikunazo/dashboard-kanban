<div class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-center gap-3 px-4 py-3 min-w-[300px] max-w-md rounded-xl shadow-2xl shadow-black/40 backdrop-blur-xl border border-slate-700/80 bg-slate-900/95 transform transition-all animate-fade-in-up"
    >
      @if (toast.type === 'success') {
        <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-emerald-500/20 text-emerald-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd" /></svg>
        </div>
      } @else if (toast.type === 'error') {
        <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-red-500/20 text-red-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
        </div>
      } @else {
        <div class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-blue-500/20 text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
        </div>
      }
      
      <p class="text-sm font-medium text-slate-200 flex-1">{{ toast.message }}</p>
      
      <button
        (click)="toastService.remove(toast.id)"
        class="text-slate-500 hover:text-slate-300 transition-colors p-1 hover:bg-slate-800 rounded"
        title="Dismiss"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      </button>
    </div>
  }
</div>

<style>
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(1rem) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.3s cubic-bezier(0.16, 1, 0.4, 1.2) forwards;
  }
</style>
