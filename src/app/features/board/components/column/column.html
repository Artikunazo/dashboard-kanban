<div class="flex flex-col w-80 shrink-0 bg-gray-800 rounded-xl max-h-full">

  <!-- Header -->
  <div class="p-4 border-b border-gray-700">
    <h2 class="text-lg font-bold text-gray-100">{{ column().title }}</h2>
  </div>

  <!-- Task drop zone -->
  <div
    cdkDropList
    [cdkDropListData]="tasks()"
    (cdkDropListDropped)="taskDropped.emit($event)"
    class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[150px]"
  >
    @for (task of tasks(); track task.id) {
      <app-task-card
        cdkDrag
        [task]="task"
        (taskClicked)="taskClicked.emit(task)"
      />
    }
  </div>

  <!-- Add task button -->
  <div class="p-4 pt-0">
    <button
      (click)="addTask.emit()"
      class="w-full py-2 flex items-center justify-center gap-2 text-sm font-medium text-gray-400 hover:text-white hover:bg-gray-700 rounded-lg transition-colors border border-dashed border-gray-600"
    >
      <app-icon-plus />
      Add Task
    </button>
  </div>

</div>
